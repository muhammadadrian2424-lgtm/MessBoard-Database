<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MessBoard — Sistem Manajemen Mess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg0:#080C14;--bg1:#0D1220;--bg2:#131A2E;--bg3:#1A2340;--b1:#1E2B4A;--b2:#2A3A60;--t1:#EFF3FB;--t2:#9AADCC;--t3:#5E7499;--blue:#4B8DF8;--cyan:#22D3EE;--green:#34D399;--amber:#FBBF24;--red:#F87171;--purple:#A78BFA;--r:10px;--rs:6px;--pink:#F472B6;--orange:#FB923C;}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--t1);overflow-x:hidden;min-height:100vh;}
.mono{font-family:'IBM Plex Mono',monospace;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--bg0);}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg0);background-image:radial-gradient(ellipse at 30% 20%,rgba(75,141,248,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(34,211,238,.06) 0%,transparent 50%);}
.login-box{background:var(--bg2);border:1px solid var(--b1);border-radius:16px;padding:40px;width:400px;max-width:92%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fi .4s ease;}
.login-box h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:4px;}
.login-box h1 span{background:linear-gradient(135deg,#4B8DF8,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-box .sub{text-align:center;font-size:11px;color:var(--t3);margin-bottom:28px;}
.login-field{margin-bottom:16px;}.login-field label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.login-field input{width:100%;background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rs);padding:12px 14px;color:var(--t1);font-family:inherit;font-size:14px;outline:none;transition:border .2s;}.login-field input:focus{border-color:var(--blue);}
.login-btn{width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,#4B8DF8,#3A75D8);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;}.login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(75,141,248,.3);}
.login-err{color:var(--red);font-size:11px;text-align:center;margin-top:10px;}
.login-hint{margin-top:20px;padding:14px;background:var(--bg1);border-radius:var(--rs);border:1px solid var(--b1);}
.login-hint .acc{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;color:var(--t2);}
.login-hint .acc span:first-child{color:var(--cyan);font-weight:600;font-family:'IBM Plex Mono',monospace;}
.shell{display:flex;min-height:100vh;}
.side{width:240px;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;z-index:90;transition:transform .3s;}
.side-brand{padding:18px 16px;border-bottom:1px solid var(--b1);}
.side-brand h1{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.side-brand h1 .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#4B8DF8,#22D3EE);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.side-brand h1 span{background:linear-gradient(135deg,#4B8DF8,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.side-brand .ver{font-size:9px;color:var(--t3);display:block;margin-top:3px;margin-left:36px;text-transform:uppercase;letter-spacing:.08em;}
.side-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.snav{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:600;color:var(--t3);border:1px solid transparent;transition:all .15s;user-select:none;}
.snav:hover{background:var(--bg2);color:var(--t2);}.snav.on{background:rgba(75,141,248,.1);color:var(--blue);border-color:rgba(75,141,248,.2);}
.snav-ico{width:30px;height:30px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:14px;}
.snav.on .snav-ico{background:rgba(75,141,248,.15);}.snav.locked{opacity:.35;cursor:not-allowed;}
.side-user{padding:10px;border-top:1px solid var(--b1);}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);}
.user-avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.side-foot{padding:8px;border-top:1px solid var(--b1);}
.logout-btn{width:100%;padding:9px;border:1px solid rgba(248,113,113,.2);border-radius:var(--rs);background:rgba(248,113,113,.06);color:var(--red);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;}.logout-btn:hover{background:rgba(248,113,113,.12);}
.content{margin-left:240px;flex:1;padding:20px;min-width:0;}
.pg-hd{margin-bottom:18px;display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:10px;}
.pg-hd h2{font-size:22px;font-weight:800;}.pg-hd p{font-size:11px;color:var(--t3);margin-top:3px;}
.cd{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.cd-t{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.st{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;transition:transform .15s;}.st:hover{transform:translateY(-2px);}
.st-l{font-size:9px;color:var(--t3);text-transform:uppercase;font-weight:700;}.st-v{font-size:24px;font-weight:800;margin-top:5px;}.st-sub{font-size:10px;color:var(--t3);margin-top:2px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--rs);border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;user-select:none;}
.btn-p{background:linear-gradient(135deg,#4B8DF8,#3A75D8);color:#fff;}.btn-p:hover{box-shadow:0 4px 16px rgba(75,141,248,.3);transform:translateY(-1px);}
.btn-g{background:var(--bg3);color:var(--t2);border:1px solid var(--b1);}.btn-g:hover{border-color:var(--b2);}
.btn-d{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.15);}
.btn-s{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.15);}
.btn-sm{padding:5px 9px;font-size:9px;}
.badge{display:inline-flex;padding:3px 8px;border-radius:10px;font-size:9px;font-weight:700;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);animation:fi .2s;}
.ml{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--r);padding:24px;max-width:620px;width:95%;max-height:85vh;overflow-y:auto;}
.ml h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.field label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;}
.field input,.field select,.field textarea{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);padding:9px 11px;color:var(--t1);font-family:inherit;font-size:12px;outline:none;width:100%;}.field input:focus,.field select:focus{border-color:var(--blue);}
.field select option{background:var(--bg1);}
.loading{text-align:center;padding:40px;color:var(--t3);font-size:13px;}
.loading::after{content:'';display:inline-block;width:18px;height:18px;border:3px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle;}
.hidden{display:none!important;}
.mess-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.mess-tab{padding:10px 20px;border-radius:var(--rs);border:1px solid var(--b1);background:var(--bg2);color:var(--t3);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.mess-tab:hover{border-color:var(--b2);color:var(--t2);}.mess-tab.active{border-color:var(--blue);color:var(--blue);background:rgba(75,141,248,.08);}
.mess-tab .tab-count{font-size:9px;opacity:.7;margin-left:4px;}
.floor-plan{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.room-card{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .25s;min-height:130px;}
.room-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3);border-color:var(--b2);}
.room-card.occupied{border-color:rgba(75,141,248,.3);}.room-card.full{border-color:rgba(248,113,113,.3);}
.room-card .room-num{font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.room-card .room-num .status-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite;}
.room-card.empty .status-dot{background:var(--green);}.room-card.occupied .status-dot{background:var(--amber);}.room-card.full .status-dot{background:var(--red);}
.beds-area{display:flex;gap:6px;margin-bottom:8px;min-height:44px;align-items:flex-end;}
.bed-icon{position:relative;transition:all .3s cubic-bezier(.34,1.56,.64,1);opacity:0;transform:scale(.3) translateY(10px);}.bed-icon.show{opacity:1;transform:scale(1) translateY(0);}
.bed-svg{width:42px;height:36px;}
.bed-occupied .bed-frame{fill:var(--blue);}.bed-empty .bed-frame{fill:var(--b2);}
.bed-occupied .bed-pillow{fill:#6BA3FF;}.bed-empty .bed-pillow{fill:var(--b1);}
.bed-occupied .bed-blanket{fill:#3A75D8;}.bed-empty .bed-blanket{fill:var(--bg3);}
.room-card .occupants{font-size:9px;color:var(--t2);line-height:1.4;}
.room-card .occupants .occ-name{font-weight:600;color:var(--t1);font-size:10px;}
.bed-ctrl-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--b1);background:var(--bg2);color:var(--t3);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-weight:700;}
.bed-ctrl-btn:hover{border-color:var(--blue);color:var(--blue);}.bed-ctrl-btn.remove:hover{border-color:var(--red);color:var(--red);}
.catering-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.catering-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px;text-align:center;}
.catering-card .meal-icon{font-size:28px;margin-bottom:6px;}.catering-card .meal-label{font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:700;}
.catering-card .meal-count{font-size:32px;font-weight:800;margin-top:4px;}
.catering-card.morning{border-top:3px solid var(--amber);}.catering-card.noon{border-top:3px solid var(--orange);}.catering-card.night{border-top:3px solid var(--purple);}
.dtb{width:100%;border-collapse:collapse;font-size:11px;}
.dtb th{text-align:left;padding:10px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--b1);background:rgba(0,0,0,.15);}
.dtb td{padding:10px;border-bottom:1px solid rgba(30,43,74,.5);}.dtb tbody tr:hover{background:var(--bg3);}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rs);}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t2);}.legend-dot{width:10px;height:10px;border-radius:50%;}
.guest-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:all .15s;}
.guest-card:hover{border-color:var(--b2);}
.guest-card .gc-top{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:10px;}
.guest-card .gc-name{font-size:14px;font-weight:700;}
.guest-card .gc-company{font-size:11px;color:var(--t3);}
.guest-card .gc-dates{font-size:10px;color:var(--t2);margin-top:4px;}
.guest-card .gc-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1);}
.guest-card .gc-room-select{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rs);padding:6px 8px;color:var(--t1);font-family:inherit;font-size:11px;outline:none;min-width:160px;}
.guest-card .gc-room-select:focus{border-color:var(--blue);}
.guest-card .gc-room-select option{background:var(--bg1);}
.guest-card.approved{border-left:3px solid var(--green);}
.guest-card.rejected{border-left:3px solid var(--red);opacity:.6;}
.guest-card.pending{border-left:3px solid var(--amber);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.fi{animation:fi .3s ease forwards;}
@media(max-width:860px){.side{transform:translateX(-100%);}.side.open{transform:translateX(0);}.content{margin-left:0;padding:12px;}#mob-toggle{display:block!important;}.floor-plan{grid-template-columns:repeat(2,1fr);}.catering-grid{grid-template-columns:1fr;}.stats{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.floor-plan{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h1>🏠 <span>MessBoard</span></h1>
    <div class="sub">Sistem Manajemen Kamar Mess</div>
    <div class="login-field"><label>Username</label><input id="inp-user" placeholder="Username"></div>
    <div class="login-field"><label>Password</label><input id="inp-pass" type="password" placeholder="Password"></div>
    <button class="login-btn" id="btn-login">Login</button>
    <div class="login-err hidden" id="login-err"></div>
    <div class="login-hint">
      <p style="font-weight:700;margin-bottom:6px;font-size:11px">Demo:</p>
      <div class="acc"><span>admin</span><span>admin123</span><span style="color:var(--t3)">Admin</span></div>
      <div class="acc"><span>staff</span><span>staff123</span><span style="color:var(--t3)">Staff</span></div>
      <div class="acc"><span>viewer</span><span>viewer123</span><span style="color:var(--t3)">Viewer</span></div>
    </div>
  </div>
</div>
<div id="app-shell" class="shell hidden">
  <button class="btn btn-g btn-sm" id="mob-toggle" style="position:fixed;top:8px;left:8px;z-index:100;display:none">☰</button>
  <div class="side" id="sidebar">
    <div class="side-brand"><h1><div class="logo-icon">🏠</div><span>MessBoard</span></h1><div class="ver">v2.0</div></div>
    <div class="side-nav" id="side-nav"></div>
    <div class="side-user"><div class="user-card"><div class="user-avatar" id="side-avatar"></div><div><div id="side-name" style="font-size:12px;font-weight:700"></div><div id="side-role" style="font-size:9px;color:var(--t3)"></div></div></div></div>
    <div class="side-foot"><button class="logout-btn" id="btn-logout">🚪 Logout</button></div>
  </div>
  <div class="content">
    <div id="top-bar" style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:8px 14px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs)"></div>
    <div id="page-container"></div>
  </div>
</div>
<script>
var API='https://script.google.com/macros/s/AKfycbzliXDWLwkdNUxrJbM2oFffrcZGu04eqgex8-6J7oxA8C59dGi8TRdmrO_2Md_s9mefJg/exec';
var FORM_URL='https://forms.gle/1xjfH4aMRyVF5UPz7';

async function apiGet(p){try{var r=await fetch(API+'?'+new URLSearchParams(p));return await r.json();}catch(e){return{error:e.message};}}
async function apiPost(d){try{var r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(d)});return await r.json();}catch(e){return{error:e.message};}}

var MESS_CONFIG={'Mess L':{rooms:10,color:'#4B8DF8',icon:'🏢'},'Mess T':{rooms:10,color:'#34D399',icon:'🏨'},'Mess I':{rooms:10,color:'#A78BFA',icon:'🏬'}};
var roomsData={};
var availableRoomsList=[];

function buildRoomsData(apiRooms){
  roomsData={};
  for(var i=0;i<apiRooms.length;i++){
    var r=apiRooms[i];var key=r.mess+'-K'+r.room_number;var occs=[];
    if(r.occupants){for(var j=0;j<r.occupants.length;j++){var o=r.occupants[j];occs.push({id:o.id,name:o.name,company:o.company||'',meal:{pagi:o.meal_pagi===true||o.meal_pagi==='TRUE',siang:o.meal_siang===true||o.meal_siang==='TRUE',malam:o.meal_malam===true||o.meal_malam==='TRUE'}});}}
    roomsData[key]={mess:r.mess,room:Number(r.room_number),beds:Number(r.beds),room_id:r.room_id,occupants:occs};
  }
}
async function loadRooms(){var res=await apiGet({action:'getRooms'});if(res.data)buildRoomsData(res.data);return res;}

var ROLES={admin:{label:'Administrator',icon:'👤',color:'#4B8DF8',pages:['dashboard','messmap','catering','guests','settings']},staff:{label:'Staff',icon:'👷',color:'#F59E0B',pages:['dashboard','messmap','catering','guests']},viewer:{label:'Viewer',icon:'👁️',color:'#8B5CF6',pages:['dashboard','messmap','catering']}};
var NAV=[{id:'dashboard',icon:'📊',label:'Dashboard',desc:'Ringkasan data'},{id:'messmap',icon:'🏠',label:'Denah Mess',desc:'Peta kamar & kasur'},{id:'catering',icon:'🍽️',label:'Catering',desc:'Packmeal harian'},{id:'guests',icon:'📝',label:'Tamu',desc:'Form & daftar tamu'},{id:'settings',icon:'⚙️',label:'Settings',desc:'Pengaturan'}];
var currentUser=null,currentPage='dashboard',selectedMess='Mess L';

document.getElementById('btn-login').onclick=doLogin;
document.getElementById('inp-pass').onkeydown=function(e){if(e.key==='Enter')doLogin();};
document.getElementById('inp-user').onkeydown=function(e){if(e.key==='Enter')document.getElementById('inp-pass').focus();};

async function doLogin(){
  var u=document.getElementById('inp-user').value.trim(),p=document.getElementById('inp-pass').value;
  var err=document.getElementById('login-err'),btn=document.getElementById('btn-login');
  err.classList.add('hidden');
  if(!u||!p){err.textContent='Masukkan username dan password';err.classList.remove('hidden');return;}
  btn.textContent='Logging in...';btn.disabled=true;
  var res=await apiGet({action:'login',username:u,password:p});
  if(res.success){
    var role=ROLES[res.user.role]||{label:res.user.role,icon:'👤',color:'#4B8DF8',pages:['dashboard']};
    currentUser={username:res.user.username,role:res.user.role,name:res.user.name,label:role.label,icon:role.icon,color:role.color,pages:role.pages};
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-shell').classList.remove('hidden');
    buildSidebar();navigate('dashboard');
  }else{err.textContent=res.error||'Login gagal';err.classList.remove('hidden');}
  btn.textContent='Login';btn.disabled=false;
}
document.getElementById('btn-logout').onclick=function(){currentUser=null;roomsData={};document.getElementById('app-shell').classList.add('hidden');document.getElementById('login-screen').classList.remove('hidden');document.getElementById('inp-user').value='';document.getElementById('inp-pass').value='';};
document.getElementById('mob-toggle').onclick=function(){document.getElementById('sidebar').classList.toggle('open');};

function buildSidebar(){
  var u=currentUser;
  document.getElementById('side-avatar').innerHTML=u.icon;
  document.getElementById('side-avatar').style.cssText='background:'+u.color+'22;color:'+u.color+';width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px';
  document.getElementById('side-name').textContent=u.name;
  document.getElementById('side-role').textContent=u.label;
  document.getElementById('top-bar').innerHTML='<span>'+u.icon+'</span><span style="font-size:12px;font-weight:700;color:'+u.color+'">'+u.name+'</span><span style="font-size:10px;color:var(--t3)"> '+u.label+'</span><span style="flex:1"></span><span style="font-size:10px;color:var(--t3)" class="mono">'+new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</span>';

h+='<div style="text-align:right"><button class="btn btn-g" onclick="closeModal()">Tutup</button></div>';showModal(h);requestAnimationFrame(function(){requestAnimationFrame(function(){var b=document.querySelectorAll('#gm .bed-icon');for(var i=0;i<b.length;i++)b[i].classList.add('show');});});}

async function changeBeds(key,d){var room=roomsData[key];var nb=room.beds+d;if(nb<1||nb>4)return;if(nb<room.occupants.length){alert('Masih ada penghuni!');return;}var res=await apiPost({action:'updateRoomBeds',room_id:room.room_id,beds:nb});if(res.success){room.beds=nb;openRoomDetail(key);}else alert(res.error||'Gagal');}

// ★ GUESTS — dengan Approve + Pilih Kamar + auto-assign

async function renderGuests(c){
  c.innerHTML='<div class="loading">Memuat data tamu...</div>';

  // Load rooms + guests bersamaan
  await loadRooms();
  var gRes=await apiGet({action:'getGuestRequests'});
  var guests=gRes.data||[];

  // Hitung available rooms
  availableRoomsList=[];
  var rk=Object.keys(roomsData);
  for(var i=0;i<rk.length;i++){
    var rm=roomsData[rk[i]];
    var free=rm.beds-rm.occupants.length;
    if(free>0)availableRoomsList.push({room_id:rm.room_id,mess:rm.mess,room:rm.room,free:free,beds:rm.beds,occupied:rm.occupants.length});
  }

  var canEdit=currentUser&&(currentUser.role==='admin'||currentUser.role==='staff');
  var h='<div class="pg-hd fi"><div><h2>📝 Tamu Menginap</h2><p>'+guests.length+' request</p></div><a href="'+FORM_URL+'" target="_blank" class="btn btn-p">🔗 Buka Google Form</a></div>';

  // Filter tabs
  var pending=0,approved=0,rejected=0;
  for(var i=0;i<guests.length;i++){
    if(guests[i].status==='Pending')pending++;
    else if(guests[i].status==='Approved')approved++;
    else rejected++;
  }
  h+='<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">'
    +'<div class="mess-tab active" onclick="filterGuests(\'all\')" id="gf-all">Semua <span class="tab-count">('+guests.length+')</span></div>'
    +'<div class="mess-tab" onclick="filterGuests(\'Pending\')" id="gf-Pending" style="border-left:3px solid var(--amber)">Pending <span class="tab-count">('+pending+')</span></div>'
    +'<div class="mess-tab" onclick="filterGuests(\'Approved\')" id="gf-Approved" style="border-left:3px solid var(--green)">Approved <span class="tab-count">('+approved+')</span></div>'
    +'<div class="mess-tab" onclick="filterGuests(\'Rejected\')" id="gf-Rejected" style="border-left:3px solid var(--red)">Rejected <span class="tab-count">('+rejected+')</span></div>'
    +'</div>';

  // Guest cards
  h+='<div id="guest-list">';
  if(guests.length===0){
    h+='<div class="cd" style="text-align:center;color:var(--t3);padding:30px">Belum ada data tamu. Submit via Google Form.</div>';
  }else{
    for(var i=0;i<guests.length;i++){
      var g=guests[i];
      var statusCls=g.status==='Approved'?'approved':g.status==='Rejected'?'rejected':'pending';
      var sc=g.status==='Approved'?'var(--green)':g.status==='Pending'?'var(--amber)':'var(--red)';
      var sbg=g.status==='Approved'?'rgba(52,211,153,.1)':g.status==='Pending'?'rgba(251,191,36,.1)':'rgba(248,113,113,.1)';

      h+='<div class="guest-card '+statusCls+' fi" data-status="'+g.status+'">';
      h+='<div class="gc-top"><div><div class="gc-name">'+(g.name||'-')+'</div><div class="gc-company">'+(g.company||'-')+'</div><div class="gc-dates">📅 '+(g.check_in||'-')+' → '+(g.check_out||'-')+'</div>';
      if(g.mess_preference)h+='<div style="margin-top:4px"><span class="badge" style="background:rgba(75,141,248,.1);color:var(--blue)">'+g.mess_preference+'</span></div>';
      h+='</div><span class="badge" style="background:'+sbg+';color:'+sc+'">'+g.status+'</span></div>';

      // Meal info
      h+='<div style="font-size:10px;color:var(--t3);margin-bottom:6px">Meal: '
        +(g.meal_pagi===true||g.meal_pagi==='TRUE'?'🌅 Pagi ':'')
        +(g.meal_siang===true||g.meal_siang==='TRUE'?'☀️ Siang ':'')
        +(g.meal_malam===true||g.meal_malam==='TRUE'?'🌙 Malam':'')
        +'</div>';

      // Approved — tampilkan kamar yang di-assign
      if(g.status==='Approved'&&g.assigned_room){
        h+='<div style="padding:8px 10px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:var(--rs);font-size:11px;color:var(--green);font-weight:700">✅ Kamar: '+g.assigned_room+'</div>';
      }

      // Actions untuk admin/staff pada status Pending
      if(canEdit&&g.status==='Pending'){
        h+='<div class="gc-actions">'
          +'<select class="gc-room-select" id="room-sel-'+g.id+'">'
          +'<option value="">-- Pilih Kamar --</option>';

        // Group by mess
        var messNames=Object.keys(MESS_CONFIG);
        for(var mi=0;mi<messNames.length;mi++){
          var messN=messNames[mi];
          var messRooms=[];
          for(var ari=0;ari<availableRoomsList.length;ari++){
            if(availableRoomsList[ari].mess===messN)messRooms.push(availableRoomsList[ari]);
          }
          if(messRooms.length>0){
            h+='<optgroup label="'+messN+'">';
            for(var mri=0;mri<messRooms.length;mri++){
              var ar=messRooms[mri];
              h+='<option value="'+ar.room_id+'">K'+ar.room+' ('+ar.occupied+'/'+ar.beds+' — sisa '+ar.free+')</option>';
            }
            h+='</optgroup>';
          }
        }
        h+='</select>'
          +'<button class="btn btn-s btn-sm" onclick="approveGuest(\''+g.id+'\')">✓ Approve</button>'
          +'<button class="btn btn-d btn-sm" onclick="rejectGuest(\''+g.id+'\')">✗ Reject</button>'
          +'</div>';
      }

      // Reject button for approved guests
      if(canEdit&&g.status==='Approved'){
        h+='<div class="gc-actions"><button class="btn btn-d btn-sm" onclick="rejectGuest(\''+g.id+'\')">✗ Batalkan / Reject</button></div>';
      }

      h+='</div>';
    }
  }
  h+='</div>';
  c.innerHTML=h;
}

// Filter guest cards
function filterGuests(status){
  var cards=document.querySelectorAll('.guest-card');
  for(var i=0;i<cards.length;i++){
    if(status==='all')cards[i].style.display='';
    else cards[i].style.display=cards[i].dataset.status===status?'':'none';
  }
  var tabs=document.querySelectorAll('.mess-tab');
  for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
  var activeTab=document.getElementById('gf-'+status);
  if(activeTab)activeTab.classList.add('active');
}

// ★ Approve guest + assign kamar → otomatis masuk denah
async function approveGuest(guestId){
  var sel=document.getElementById('room-sel-'+guestId);
  if(!sel||!sel.value){alert('Pilih kamar terlebih dahulu!');return;}
  if(!confirm('Approve tamu ini dan assign ke kamar '+sel.value+'?'))return;

  var btn=sel.parentElement.querySelector('.btn-s');
  if(btn){btn.textContent='Processing...';btn.disabled=true;}

  var res=await apiPost({action:'approveGuest',id:guestId,assigned_room:sel.value,username:currentUser.username});
  if(res.success){
    alert(res.message||'Berhasil! Tamu otomatis masuk ke denah mess.');
    renderGuests(document.getElementById('page-container'));
  }else{
    alert(res.error||'Gagal approve');
    if(btn){btn.textContent='✓ Approve';btn.disabled=false;}
  }
}

// Reject guest
async function rejectGuest(guestId){
  if(!confirm('Reject tamu ini?'))return;
  var res=await apiPost({action:'rejectGuest',id:guestId,username:currentUser.username});
  if(res.success){renderGuests(document.getElementById('page-container'));}
  else alert(res.error||'Gagal reject');
}

// ===== SETTINGS =====
function renderSettings(c){var h='<div class="pg-hd fi"><div><h2>⚙️ Settings</h2></div></div>';h+='<div class="cd fi" style="border-left:3px solid var(--blue)"><div class="cd-t">Google Apps Script URL</div><div class="field"><label>Web App URL</label><input value="'+API+'" style="font-family:monospace;font-size:11px" readonly></div></div>';h+='<div class="cd fi" style="border-left:3px solid var(--green)"><div class="cd-t">Google Form URL</div><div class="field"><label>Form Tamu</label><input value="'+FORM_URL+'" style="font-family:monospace;font-size:11px" readonly></div></div>';h+='<div class="cd fi" style="border-left:3px solid var(--amber)"><div class="cd-t">Status</div><div style="font-size:12px;color:var(--green);font-weight:700">✅ Terhubung ke Google Sheets</div></div>';c.innerHTML=h;}
</script>
